  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>

  <script>
    if (window.addEventListener) {
      window.addEventListener('message', onMessage, false);
    } else if (window.attachEvent) {
      window.attachEvent('onmessage', onMessage, false);
    }

    function onMessage(event) {
      var data = event.data;

      if (typeof window[data.func] == 'function') {
        window[data.func].call(null, data.message);
      }
    }
    function CallTheme() {
      //alert("Call From Parrent!");
      //let btn = document.getElementsByClassName('theme-control-toggle');
      //btn.click();
      var tema = localStorage.getItem('theme');
      if (tema == 'light') {
        localStorage.setItem('theme', 'dark');
        localStorage.setItem('isDark', true);
        () => changeTheme(isDark ? 'light' : 'dark');
        () => setConfig('isDark', !isDark);
        document.documentElement.setAttribute('data-bs-theme', 'dark');
        document.documentElement.getAttribute('data-bs-theme');
        //alert(tema + "-" + document.documentElement.getAttribute('data-bs-theme'));
      } else {
        localStorage.setItem('theme', 'light');
        localStorage.setItem('isDark', false);
        () => changeTheme(isDark ? 'light' : 'dark');
        () => setConfig('isDark', !isDark);
        document.documentElement.setAttribute('data-bs-theme', 'light');
        //alert(tema + "-" + document.documentElement.getAttribute('data-bs-theme'));
      }
    }

    function LogOff() {
      //alert("Call From Parrent!");
      //let btn = document.getElementsByClassName('theme-control-toggle');

      localStorage.removeItem('userData');
    }
  </script>
